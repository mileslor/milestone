<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>職員更期查詢</title>
<meta name="robots" content="noindex, nofollow" />
<style>
  body { margin: 0; font-family: -apple-system, sans-serif; background: #f5f5f5;
         display: flex; align-items: center; justify-content: center; height: 100vh; }
  .spinner { width: 40px; height: 40px; border: 4px solid #ddd;
             border-top-color: #007aff; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="spinner"></div>
<script>
(function() {
  const token = localStorage.getItem('portal_device_token');
  const expires = localStorage.getItem('portal_token_expires');

  if (!token) { location.replace('/portal/register.html'); return; }

  const now = new Date().toISOString().slice(0, 19);
  if (expires && expires < now) { location.replace('/portal/expired.html'); return; }

  // Verify token still valid server-side before redirecting
  fetch('/api/auth/status', {
    headers: { 'X-Device-Uuid': localStorage.getItem('portal_device_uuid') || '' }
  })
  .then(r => r.json())
  .then(d => {
    if (d.status === 'approved') {
      // Refresh local token/expiry in case renewed
      if (d.token) localStorage.setItem('portal_device_token', d.token);
      if (d.expires_at) localStorage.setItem('portal_token_expires', d.expires_at);
      location.replace('/portal/roster.html');
    } else if (d.status === 'expired' || d.status === 'revoked') {
      localStorage.removeItem('portal_device_token');
      location.replace('/portal/expired.html');
    } else {
      location.replace('/portal/register.html');
    }
  })
  .catch(() => location.replace('/portal/roster.html')); // offline: trust local token
})();
</script>
</body>
</html>
