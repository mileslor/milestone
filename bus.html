<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BusETA — 巴士到站時間 | Milestone Technology</title>
  <meta name="description" content="免費巴士到站時間查詢工具，自行搜尋並加入常用巴士站，實時顯示到站時間，支援深色模式，適合裝喺舊手機、平板做擺設。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+HK:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'Noto Sans HK', 'system-ui', 'sans-serif'] },
          colors: {
            background: 'hsl(210, 20%, 98%)',
            foreground: 'hsl(213, 32%, 12%)',
            card: { DEFAULT: 'hsl(0, 0%, 100%)', foreground: 'hsl(213, 32%, 12%)' },
            primary: { DEFAULT: 'hsl(213, 80%, 18%)', foreground: 'hsl(210, 20%, 98%)' },
            muted: { DEFAULT: 'hsl(210, 16%, 93%)', foreground: 'hsl(213, 10%, 46%)' },
            accent: { DEFAULT: 'hsl(211, 100%, 50%)', foreground: 'hsl(0, 0%, 100%)' },
            border: 'hsl(214, 20%, 88%)',
          },
          borderRadius: { lg: '0.625rem', xl: '0.875rem', '2xl': '1rem' },
        },
      },
    }
  </script>
  <style>
    html { scroll-behavior: smooth; }
    .dark body { background: hsl(222, 30%, 8%); color: hsl(210, 20%, 92%); }
    .dark .card-surface { background: hsl(222, 26%, 12%); border-color: hsl(222, 18%, 20%); }
    .dark .muted-surface { background: hsl(222, 22%, 16%); border-color: hsl(222, 18%, 22%); }
    .dark .text-muted-foreground { color: hsl(215, 12%, 62%) !important; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: hsl(214, 20%, 80%); border-radius: 999px; }
    .dark ::-webkit-scrollbar-thumb { background: hsl(222, 18%, 28%); }
    .eta-pill { font-variant-numeric: tabular-nums; }
    .clock-font { font-variant-numeric: tabular-nums; }
    @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .live-dot { animation: pulse-dot 2s ease-in-out infinite; }
  </style>
</head>
<body class="font-sans antialiased bg-background text-foreground min-h-screen">

  <!-- Navbar -->
  <header class="sticky top-0 z-50 bg-white/80 dark:bg-transparent backdrop-blur-md border-b border-border">
    <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-3 sm:px-6">
      <a href="/" class="flex items-center gap-2">
        <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-primary">
          <span class="text-xs font-bold text-primary-foreground tracking-tight">M</span>
        </div>
        <span class="text-base font-bold tracking-tight">Milestone</span>
      </a>
      <div class="flex items-center gap-2">
        <button id="theme-toggle" onclick="toggleTheme()" title="切換深色/淺色" class="inline-flex h-8 w-8 items-center justify-center rounded-lg border border-border text-sm transition-colors hover:border-foreground">🌙</button>
        <a href="/" class="text-sm font-medium text-muted-foreground transition-colors hover:text-foreground">← 返回主頁</a>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-5xl px-4 py-6 sm:px-6 sm:py-8">

    <!-- Clock + status -->
    <div class="mb-6 flex items-center justify-between rounded-2xl border border-border card-surface bg-card px-5 py-4">
      <div>
        <div id="clock" class="clock-font text-3xl font-bold tracking-tight sm:text-4xl">--:--:--</div>
        <div id="date-str" class="text-sm text-muted-foreground mt-0.5">--</div>
      </div>
      <div class="text-right text-xs text-muted-foreground">
        <div class="flex items-center justify-end gap-1.5">
          <span id="refresh-dot" class="live-dot h-2 w-2 rounded-full bg-accent"></span>
          <span id="refresh-status">實時更新中</span>
        </div>
        <div class="mt-1">每 30 秒自動更新</div>
      </div>
    </div>

    <!-- My stops grid (each tile = one chosen region/company/stop) -->
    <div id="my-stops" class="grid grid-cols-1 gap-4 sm:grid-cols-2 mb-4"></div>

    <div id="empty-state" class="mb-4 rounded-2xl border border-dashed border-border p-10 text-center text-muted-foreground hidden">
      <div class="mb-3 text-4xl">🚌</div>
      <p class="text-sm">未加入任何格仔，撳下面「+ 加新格」揀地區、公司同車站。</p>
    </div>

    <!-- Add-tile picker -->
    <div class="rounded-2xl border border-border card-surface bg-card p-5">
      <button id="add-tile-btn" type="button" onclick="openPicker()" class="w-full flex items-center justify-center gap-2 rounded-lg border border-dashed border-border py-3 text-sm font-semibold text-muted-foreground transition-colors hover:border-accent hover:text-accent">
        <span class="text-lg leading-none">＋</span> 加新格
      </button>

      <div id="picker-panel" class="mt-4 hidden">
        <!-- Step 1: region -->
        <div id="picker-step-region">
          <div class="mb-3 flex items-center justify-between">
            <span class="text-sm font-semibold">1. 揀地區</span>
            <button type="button" onclick="closePicker()" class="text-xs text-muted-foreground hover:text-foreground">取消</button>
          </div>
          <div id="region-list" class="grid grid-cols-2 gap-3"></div>
        </div>

        <!-- Step 2: company -->
        <div id="picker-step-company" class="hidden">
          <div class="mb-3 flex items-center justify-between">
            <button type="button" onclick="backToRegion()" class="text-xs text-muted-foreground hover:text-foreground">← 返回</button>
            <span class="text-sm font-semibold" id="company-step-title">2. 揀公司／路線種類</span>
            <button type="button" onclick="closePicker()" class="text-xs text-muted-foreground hover:text-foreground">取消</button>
          </div>
          <div id="company-list" class="grid grid-cols-2 gap-3"></div>
          <div id="company-unavailable-note" class="mt-3 hidden rounded-lg muted-surface bg-muted p-3 text-xs text-muted-foreground"></div>
        </div>

        <!-- Step 3: stop search -->
        <div id="picker-step-search" class="hidden">
          <div class="mb-3 flex items-center justify-between">
            <button type="button" onclick="backToCompany()" class="text-xs text-muted-foreground hover:text-foreground">← 返回</button>
            <span class="text-sm font-semibold">3. 搜尋車站</span>
            <button type="button" onclick="closePicker()" class="text-xs text-muted-foreground hover:text-foreground">取消</button>
          </div>
          <button id="nearby-btn" type="button" onclick="onNearbyClick()"
            class="mb-2 w-full flex items-center justify-center gap-2 rounded-lg border border-border py-2.5 text-sm font-medium transition-colors hover:border-accent hover:text-accent">
            📍 搵附近車站
          </button>
          <div class="relative">
            <input id="search-input" type="text" placeholder="輸入車站名稱或巴士號碼，例如：旺角、1A..."
              class="w-full rounded-lg border border-border bg-background px-4 py-2.5 text-sm outline-none transition-colors focus:border-accent"
              autocomplete="off" />
            <div id="search-loading" class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-muted-foreground hidden">載入資料中...</div>
          </div>
          <div id="search-results" class="mt-2 max-h-80 overflow-y-auto rounded-lg border border-border hidden divide-y divide-border"></div>
        </div>

        <!-- Step 3b: stops along a chosen route -->
        <div id="picker-step-route-stops" class="hidden">
          <div class="mb-3 flex items-center justify-between">
            <button type="button" onclick="backToSearch()" class="text-xs text-muted-foreground hover:text-foreground">← 返回</button>
            <span class="text-sm font-semibold">揀車站</span>
            <button type="button" onclick="closePicker()" class="text-xs text-muted-foreground hover:text-foreground">取消</button>
          </div>
          <p id="route-stops-title" class="mb-3 text-sm font-medium"></p>
          <div id="route-stops-list" class="max-h-80 overflow-y-auto rounded-lg border border-border divide-y divide-border">
            <div class="px-4 py-3 text-sm text-muted-foreground">載入車站中...</div>
          </div>
        </div>

        <!-- Step 4: route selection -->
        <div id="picker-step-routes" class="hidden">
          <div class="mb-3 flex items-center justify-between">
            <button type="button" onclick="backToSearch()" class="text-xs text-muted-foreground hover:text-foreground">← 返回</button>
            <span class="text-sm font-semibold">4. 揀路線</span>
            <button type="button" onclick="closePicker()" class="text-xs text-muted-foreground hover:text-foreground">取消</button>
          </div>
          <p id="route-select-stop-name" class="mb-2 text-sm font-medium"></p>
          <p class="mb-3 text-xs text-muted-foreground">呢個站有幾條路線經過，剔選你想顯示嘅路線。</p>
          <div class="mb-3 flex gap-3 text-xs">
            <button type="button" onclick="toggleAllRoutes(true)" class="text-accent hover:underline">全選</button>
            <button type="button" onclick="toggleAllRoutes(false)" class="text-accent hover:underline">清除</button>
          </div>
          <div id="route-select-list" class="max-h-72 overflow-y-auto rounded-lg border border-border divide-y divide-border">
            <div class="px-4 py-3 text-sm text-muted-foreground">載入路線資料中...</div>
          </div>
          <button id="confirm-routes-btn" type="button" onclick="confirmRouteSelection()" disabled
            class="mt-4 w-full rounded-lg bg-accent px-4 py-2.5 text-sm font-semibold text-white transition-opacity disabled:opacity-40 disabled:cursor-not-allowed">
            確認加入
          </button>
        </div>
      </div>
    </div>

  </main>

  <footer class="border-t border-border py-8 text-center text-xs text-muted-foreground">
    <p>資料來源：運輸署 KMB ETA 開放數據 (data.etabus.gov.hk)。實時資料僅供參考，以車站現場顯示為準。</p>
    <p class="mt-1"><a href="/" class="hover:text-foreground transition-colors">hkmilestone.com</a></p>
  </footer>

  <script>
    // ---------- Theme ----------
    function applyTheme(t) {
      document.documentElement.classList.toggle('dark', t === 'dark');
      document.getElementById('theme-toggle').textContent = t === 'dark' ? '☀️' : '🌙';
    }
    function toggleTheme() {
      const next = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
      localStorage.setItem('bus_theme', next);
      applyTheme(next);
    }
    applyTheme(localStorage.getItem('bus_theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));

    // ---------- Clock ----------
    function tickClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('zh-HK', { hour12: false });
      document.getElementById('date-str').textContent = now.toLocaleDateString('zh-HK', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    }
    tickClock();
    setInterval(tickClock, 1000);

    // Shared by every provider's findNearbyStops() so "search near me" behaves identically
    // regardless of region (Hong Kong today, Manchester once that provider exists).
    function haversineDistanceMeters(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }
    function formatDistance(m) {
      return m < 1000 ? `${Math.round(m)} 米` : `${(m / 1000).toFixed(1)} 公里`;
    }

    // Large government API responses occasionally fail (connection reset) when several
    // requests hit the same host at once — retry once after a short pause before giving up.
    async function fetchJsonWithRetry(url, retries = 1) {
      try {
        const res = await fetch(url);
        return await res.json();
      } catch (err) {
        if (retries <= 0) throw err;
        await new Promise(r => setTimeout(r, 800));
        return fetchJsonWithRetry(url, retries - 1);
      }
    }

    // ---------- Provider abstraction (extensible for future companies/countries) ----------
    // Each provider implements: loadStopIndex(), searchStops(query), fetchEta(stopId)
    const Providers = {};

    Providers.KMB = {
      id: 'KMB',
      label: '九巴 KMB',
      _stopIndex: null,
      _stopLoading: null,
      _routesList: null,
      _routesLoading: null,
      _routeStopIndex: null,
      _routeStopLoading: null,
      _stopToRoutes: null, // Map stopId -> Set of route codes, built from _routeStopIndex
      _stopToRouteBounds: null, // Map stopId -> Set of "route|bound", used to reconstruct route+dest when there's no live ETA
      async loadStopIndex() {
        if (this._stopIndex) return this._stopIndex;
        if (this._stopLoading) return this._stopLoading;
        this._stopLoading = fetchJsonWithRetry('https://data.etabus.gov.hk/v1/transport/kmb/stop')
          .then(json => {
            this._stopIndex = json.data;
            return this._stopIndex;
          })
          .catch(err => { this._stopLoading = null; throw err; }); // let a later call retry instead of staying broken
        return this._stopLoading;
      },
      async loadRoutesList() {
        if (this._routesList) return this._routesList;
        if (this._routesLoading) return this._routesLoading;
        this._routesLoading = fetchJsonWithRetry('https://data.etabus.gov.hk/v1/transport/kmb/route/')
          .then(json => {
            this._routesList = json.data;
            return this._routesList;
          })
          .catch(err => { this._routesLoading = null; throw err; });
        return this._routesLoading;
      },
      async loadRouteStopIndex() {
        if (this._routeStopIndex) return this._routeStopIndex;
        if (this._routeStopLoading) return this._routeStopLoading;
        this._routeStopLoading = fetchJsonWithRetry('https://data.etabus.gov.hk/v1/transport/kmb/route-stop')
          .then(json => {
            this._routeStopIndex = json.data;
            const map = new Map();
            const boundMap = new Map();
            for (const rs of this._routeStopIndex) {
              if (!map.has(rs.stop)) map.set(rs.stop, new Set());
              map.get(rs.stop).add(rs.route);
              if (!boundMap.has(rs.stop)) boundMap.set(rs.stop, new Set());
              boundMap.get(rs.stop).add(rs.route + '|' + rs.bound);
            }
            this._stopToRoutes = map;
            this._stopToRouteBounds = boundMap;
            return this._routeStopIndex;
          })
          .catch(err => { this._routeStopLoading = null; throw err; });
        return this._routeStopLoading;
      },
      _routesPreviewFor(stopId) {
        const routeSet = this._stopToRoutes?.get(stopId);
        return routeSet ? Array.from(routeSet).sort((a, b) => a.localeCompare(b, 'zh-Hant', { numeric: true })) : [];
      },
      // Fallback for when a stop has no live ETA right now (e.g. late night, between
      // services): reconstruct the {route, dest} pairs it's scheduled to serve from the
      // static route-stop + route-list data, using the same "route|dest" key shape as
      // groupEtasByRoute so a tile added this way keeps working once buses reappear.
      async getScheduledRoutesForStop(stopId) {
        const [routes] = await Promise.all([this.loadRoutesList(), this.loadRouteStopIndex()]);
        const pairs = this._stopToRouteBounds?.get(stopId);
        if (!pairs || !pairs.size) return [];
        const destByKey = new Map(routes.map(r => [r.route + '|' + r.bound, r.dest_tc]));
        return Array.from(pairs)
          .map(key => {
            const dest = destByKey.get(key);
            if (!dest) return null;
            const [route] = key.split('|');
            return { route, dest, key: route + '|' + dest };
          })
          .filter(Boolean)
          .sort((a, b) => a.route.localeCompare(b.route, 'zh-Hant', { numeric: true }));
      },
      async searchStops(query) {
        // Route-number previews come from the (large, occasionally flaky) route-stop index,
        // loaded separately in the background — read whatever's cached, don't block or fail
        // stop-name search on it. Core search only ever depends on the stop index.
        const index = await this.loadStopIndex();
        const q = query.trim().toLowerCase();
        if (!q) return [];
        return index
          .filter(s => s.name_tc.toLowerCase().includes(q) || s.name_en.toLowerCase().includes(q) || s.name_sc.toLowerCase().includes(q))
          .slice(0, 30)
          .map(s => ({ providerId: 'KMB', stopId: s.stop, nameTc: s.name_tc, nameEn: s.name_en, routesPreview: this._routesPreviewFor(s.stop) }));
      },
      // Standard provider interface for "find stops near me" — any future region/company
      // (Manchester bus, Metrolink...) should implement the same shape: (lat, lng) -> stops
      // sorted nearest-first, each with a distanceM field, so the picker UI stays identical.
      async findNearbyStops(lat, lng) {
        const index = await this.loadStopIndex();
        return index
          .map(s => ({
            providerId: 'KMB', stopId: s.stop, nameTc: s.name_tc, nameEn: s.name_en,
            distanceM: haversineDistanceMeters(lat, lng, parseFloat(s.lat), parseFloat(s.long)),
            routesPreview: this._routesPreviewFor(s.stop),
          }))
          .sort((a, b) => a.distanceM - b.distanceM)
          .slice(0, 15);
      },
      async searchRoutes(query) {
        // Same principle: if the routes list hasn't loaded (or failed), just return no
        // route matches rather than throwing — the stop-name half of the search still works.
        let routes;
        try {
          routes = await this.loadRoutesList();
        } catch {
          return [];
        }
        const q = query.trim().toUpperCase();
        if (!q) return [];
        const matched = routes.filter(r => r.route.toUpperCase().startsWith(q));
        // one entry per route+direction, preferring the primary service_type
        const byKey = new Map();
        for (const r of matched) {
          const key = r.route + '|' + r.bound;
          if (!byKey.has(key) || r.service_type === '1') byKey.set(key, r);
        }
        return Array.from(byKey.values())
          .sort((a, b) => a.route.localeCompare(b.route, 'zh-Hant', { numeric: true }))
          .slice(0, 15)
          .map(r => ({ providerId: 'KMB', route: r.route, bound: r.bound, serviceType: r.service_type, origTc: r.orig_tc, destTc: r.dest_tc }));
      },
      async getStopsForRoute(route, bound, serviceType) {
        // Deliberately hits the small per-route endpoint (dozens of stops) instead of the
        // 3MB bulk /route-stop index — this step must stay fast and reliable even if that
        // big background-loaded file never arrives.
        const direction = bound === 'I' ? 'inbound' : 'outbound';
        const [stopIndex, routeStopJson] = await Promise.all([
          this.loadStopIndex(),
          fetchJsonWithRetry(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${encodeURIComponent(route)}/${direction}/${encodeURIComponent(serviceType)}`),
        ]);
        const stopById = new Map(stopIndex.map(s => [s.stop, s]));
        return (routeStopJson.data || [])
          .sort((a, b) => Number(a.seq) - Number(b.seq))
          .map(rs => {
            const s = stopById.get(rs.stop);
            return { providerId: 'KMB', stopId: rs.stop, nameTc: s?.name_tc || rs.stop, nameEn: s?.name_en || '', seq: rs.seq };
          });
      },
      async fetchEta(stopId) {
        const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${stopId}`);
        const json = await res.json();
        return (json.data || [])
          .filter(e => e.eta)
          .map(e => ({
            route: e.route,
            dir: e.dir,
            dest: e.dest_tc,
            etaTime: e.eta,
            remark: e.rmk_tc || '',
          }))
          .sort((a, b) => (a.route === b.route ? a.etaTime.localeCompare(b.etaTime) : a.route.localeCompare(b.route, 'zh-Hant', { numeric: true })));
      },
    };

    // ---------- Region / company catalogue (drives the add-tile picker) ----------
    // "available: false" entries render as disabled with an explanation — this is how
    // future regions/companies (Manchester bus via BODS, Metrolink, Citybus...) get slotted in.
    const REGIONS = [
      {
        id: 'hk', label: '香港', flag: '🇭🇰', available: true,
        companies: [
          { id: 'KMB', label: '九巴 KMB', available: true },
          { id: 'CTB', label: '城巴 Citybus', available: false, note: '城巴／新巴開放數據暫未整合，陸續加入中。' },
        ],
      },
      {
        id: 'manchester', label: '曼徹斯特', flag: '🇬🇧', available: true,
        companies: [
          { id: 'BEE_BUS', label: 'Bee Network 巴士', available: false, note: 'TfGM 官方即時數據 Portal 已停止接受新申請（"no longer in operation"），暫時未有替代途徑取得車站到站時間，等 TfGM 出新方案或改用英國 Bus Open Data Service 先可以做。' },
          { id: 'METROLINK', label: 'Metrolink 輕鐵', available: false, note: '同樣受 TfGM API 停止新申請影響，暫時未有公開途徑攞到 Metrolink 實時到站時間。' },
        ],
      },
    ];

    // ---------- Picker state machine ----------
    // Region choice is "sticky": once picked, re-opening the picker jumps straight
    // to the company step for that region, until the user explicitly presses
    // "← 返回" on the company step to change region.
    let pickerRegion = null;
    let pickerCompany = null;
    let pickerStop = null; // {providerId, stopId, name} while choosing routes
    let lastRegionId = localStorage.getItem('bus_last_region');

    function hideAllPickerSteps() {
      ['picker-step-region', 'picker-step-company', 'picker-step-search', 'picker-step-route-stops', 'picker-step-routes']
        .forEach(id => document.getElementById(id).classList.add('hidden'));
    }

    function openPicker() {
      document.getElementById('add-tile-btn').classList.add('hidden');
      document.getElementById('picker-panel').classList.remove('hidden');
      const region = REGIONS.find(r => r.id === lastRegionId);
      if (region) {
        selectRegion(region.id);
      } else {
        showRegionStep();
      }
    }
    function closePicker() {
      document.getElementById('add-tile-btn').classList.remove('hidden');
      document.getElementById('picker-panel').classList.add('hidden');
      pickerCompany = null;
      pickerStop = null;
      searchInput.value = '';
      searchResults.classList.add('hidden');
      searchResults.innerHTML = '';
    }
    function showRegionStep() {
      hideAllPickerSteps();
      document.getElementById('picker-step-region').classList.remove('hidden');
      const list = document.getElementById('region-list');
      list.innerHTML = REGIONS.map(r => `
        <button type="button" data-region="${r.id}" class="rounded-xl border border-border p-4 text-left transition-colors hover:border-accent">
          <div class="text-2xl mb-1">${r.flag}</div>
          <div class="text-sm font-semibold">${escapeHtml(r.label)}</div>
        </button>
      `).join('');
      list.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => selectRegion(btn.dataset.region));
      });
    }
    function selectRegion(regionId) {
      pickerRegion = REGIONS.find(r => r.id === regionId);
      lastRegionId = regionId;
      localStorage.setItem('bus_last_region', regionId);
      hideAllPickerSteps();
      document.getElementById('picker-step-company').classList.remove('hidden');
      document.getElementById('company-step-title').textContent = `2. 揀公司／路線種類（${pickerRegion.label}）`;
      const list = document.getElementById('company-list');
      const note = document.getElementById('company-unavailable-note');
      note.classList.add('hidden');
      list.innerHTML = pickerRegion.companies.map(c => `
        <button type="button" data-company="${c.id}"
          class="rounded-xl border p-4 text-left transition-colors ${c.available ? 'border-border hover:border-accent' : 'border-border opacity-50 cursor-not-allowed'}">
          <div class="text-sm font-semibold">${escapeHtml(c.label)}</div>
          <div class="mt-1 text-xs text-muted-foreground">${c.available ? '可用' : '暫時未能提供'}</div>
        </button>
      `).join('');
      list.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          const company = pickerRegion.companies.find(c => c.id === btn.dataset.company);
          if (!company.available) {
            note.textContent = 'ℹ️ ' + company.note;
            note.classList.remove('hidden');
            return;
          }
          selectCompany(company);
        });
      });
    }
    function selectCompany(company) {
      pickerCompany = company;
      hideAllPickerSteps();
      document.getElementById('picker-step-search').classList.remove('hidden');
      searchInput.value = '';
      searchResults.classList.add('hidden');
      searchResults.innerHTML = '';
      document.getElementById('nearby-btn').classList.toggle('hidden', !Providers[company.id].findNearbyStops);
      searchInput.focus();
    }
    function backToRegion() {
      pickerCompany = null;
      hideAllPickerSteps();
      document.getElementById('picker-step-region').classList.remove('hidden');
    }
    function backToCompany() {
      hideAllPickerSteps();
      selectRegion(pickerRegion.id);
    }
    function backToSearch() {
      pickerStop = null;
      hideAllPickerSteps();
      document.getElementById('picker-step-search').classList.remove('hidden');
    }

    // ---------- Route grouping (shared by picker step 4 and the ETA tiles) ----------
    function groupEtasByRoute(etas) {
      const grouped = {};
      etas.forEach(e => {
        const key = e.route + '|' + e.dest;
        (grouped[key] ||= []).push(e);
      });
      return Object.entries(grouped)
        .map(([key, arr]) => ({ key, route: arr[0].route, dest: arr[0].dest, etas: arr }))
        .sort((a, b) => a.route.localeCompare(b.route, 'zh-Hant', { numeric: true }));
    }

    // ---------- Step 4: route selection ----------
    async function selectStopForRouteChoice(providerId, stopId, name) {
      pickerStop = { providerId, stopId, name };
      hideAllPickerSteps();
      document.getElementById('picker-step-routes').classList.remove('hidden');
      document.getElementById('route-select-stop-name').textContent = name;
      const list = document.getElementById('route-select-list');
      const confirmBtn = document.getElementById('confirm-routes-btn');
      confirmBtn.disabled = true;
      list.innerHTML = '<div class="px-4 py-3 text-sm text-muted-foreground">載入路線資料中...</div>';
      try {
        const provider = Providers[providerId];
        const etas = await provider.fetchEta(stopId);
        let groups = groupEtasByRoute(etas);
        let usingSchedule = false;
        if (!groups.length && provider.getScheduledRoutesForStop) {
          // No buses running right now (late night, between services...) — fall back to
          // the scheduled route list so the user can still set up the tile; ETAs will
          // populate on their own once buses start running again.
          try {
            groups = await provider.getScheduledRoutesForStop(stopId);
            usingSchedule = true;
          } catch { /* fall through to the manual-add safety net below */ }
        }
        if (!groups.length) {
          list.innerHTML = `
            <div class="px-4 py-3 text-sm text-muted-foreground">攞唔到呢個站嘅路線資料（可能而家冇車，或者路線資料未載好）。</div>
            <button type="button" id="add-without-routes-btn" class="w-full px-4 py-2.5 text-left text-sm text-accent hover:bg-muted transition-colors font-medium">
              ➕ 照樣加入呢個站（有車到會自動顯示全部路線）
            </button>
          `;
          document.getElementById('add-without-routes-btn').addEventListener('click', () => {
            addStop(pickerStop.providerId, pickerStop.stopId, pickerStop.name, null);
            closePicker();
          });
          return;
        }
        const scheduleNote = usingSchedule
          ? '<div class="px-4 py-2 text-xs text-muted-foreground bg-muted/60">ℹ️ 呢個站而家冇即時班次，下面係一般會經過嘅路線（時間會等有車先顯示）。</div>'
          : '';
        list.innerHTML = scheduleNote + groups.map(g => `
          <label class="flex items-center gap-3 px-4 py-2.5 text-sm cursor-pointer hover:bg-muted transition-colors">
            <input type="checkbox" class="route-checkbox accent-accent" data-key="${escapeHtml(g.key)}" checked />
            <span class="shrink-0 rounded bg-primary text-primary-foreground text-xs font-bold px-2 py-1">${escapeHtml(g.route)}</span>
            <span class="truncate text-muted-foreground">往 ${escapeHtml(g.dest)}</span>
          </label>
        `).join('');
        list.querySelectorAll('.route-checkbox').forEach(cb => {
          cb.addEventListener('change', updateConfirmRoutesState);
        });
        updateConfirmRoutesState();
      } catch (err) {
        list.innerHTML = '<div class="px-4 py-3 text-sm text-red-500">載入路線失敗，請返回重試</div>';
      }
    }
    function toggleAllRoutes(checked) {
      document.querySelectorAll('.route-checkbox').forEach(cb => { cb.checked = checked; });
      updateConfirmRoutesState();
    }
    function updateConfirmRoutesState() {
      const anyChecked = !!document.querySelector('.route-checkbox:checked');
      document.getElementById('confirm-routes-btn').disabled = !anyChecked;
    }
    function confirmRouteSelection() {
      const selectedKeys = Array.from(document.querySelectorAll('.route-checkbox:checked')).map(cb => cb.dataset.key);
      if (!selectedKeys.length || !pickerStop) return;
      addStop(pickerStop.providerId, pickerStop.stopId, pickerStop.name, selectedKeys);
      closePicker();
    }

    // ---------- Search UI (step 3 of picker) ----------
    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');
    const searchLoading = document.getElementById('search-loading');
    let searchDebounce = null;

    function onNearbyClick() {
      if (!pickerCompany) return;
      const provider = Providers[pickerCompany.id];
      if (!provider.findNearbyStops) return; // button is hidden in this case, but guard anyway
      if (!navigator.geolocation) {
        searchResults.innerHTML = '<div class="px-4 py-3 text-sm text-red-500">呢個瀏覽器唔支援定位功能。</div>';
        searchResults.classList.remove('hidden');
        return;
      }
      const btn = document.getElementById('nearby-btn');
      btn.disabled = true;
      btn.textContent = '📍 定位緊...';
      searchResults.innerHTML = '<div class="px-4 py-3 text-sm text-muted-foreground">定位緊，請允許瀏覽器攞你位置...</div>';
      searchResults.classList.remove('hidden');
      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          try {
            const stops = await provider.findNearbyStops(pos.coords.latitude, pos.coords.longitude);
            renderNearbyResults(stops);
          } catch (err) {
            searchResults.innerHTML = '<div class="px-4 py-3 text-sm text-red-500">搜尋附近車站失敗，請重試。</div>';
          } finally {
            btn.disabled = false;
            btn.textContent = '📍 搵附近車站';
          }
        },
        () => {
          searchResults.innerHTML = '<div class="px-4 py-3 text-sm text-red-500">攞唔到你嘅位置，請檢查瀏覽器定位權限後再試。</div>';
          btn.disabled = false;
          btn.textContent = '📍 搵附近車站';
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    function renderNearbyResults(stops) {
      if (!stops.length) {
        searchResults.innerHTML = '<div class="px-4 py-3 text-sm text-muted-foreground">附近搵唔到車站</div>';
        searchResults.classList.remove('hidden');
        return;
      }
      let html = '<div class="px-4 py-1.5 text-xs font-semibold text-muted-foreground bg-muted/60">📍 附近車站</div>';
      html += stops.map(s => `
        <button type="button" class="w-full px-4 py-2.5 text-left text-sm hover:bg-muted transition-colors" data-kind="stop" data-provider="${s.providerId}" data-stop="${s.stopId}" data-name="${escapeHtml(s.nameTc)}">
          <div class="flex items-center justify-between gap-2">
            <span>${escapeHtml(s.nameTc)}</span>
            <span class="text-xs font-medium text-accent shrink-0">${formatDistance(s.distanceM)}</span>
          </div>
          ${s.routesPreview && s.routesPreview.length ? `<div class="mt-0.5 text-xs text-muted-foreground truncate">路線：${escapeHtml(s.routesPreview.slice(0, 12).join('、'))}${s.routesPreview.length > 12 ? ' ...' : ''}</div>` : ''}
        </button>
      `).join('');
      searchResults.innerHTML = html;
      searchResults.classList.remove('hidden');
      searchResults.querySelectorAll('button[data-kind="stop"]').forEach(btn => {
        btn.addEventListener('click', () => {
          selectStopForRouteChoice(btn.dataset.provider, btn.dataset.stop, btn.dataset.name);
        });
      });
    }

    searchInput.addEventListener('focus', () => {
      if (!pickerCompany) return;
      const provider = Providers[pickerCompany.id];
      // Stop-name search only needs the stop index — unblock typing as soon as that's ready.
      searchLoading.classList.remove('hidden');
      const stopIndexReady = provider.loadStopIndex();
      stopIndexReady.finally(() => searchLoading.classList.add('hidden'));
      // Route-number search + route previews are a background enhancement, loaded strictly
      // one-at-a-time after the stop index. Firing these large government-API requests
      // concurrently caused intermittent connection failures during testing — the API seems
      // to reject overlapping large requests from the same client.
      if (provider.loadRoutesList && provider.loadRouteStopIndex) {
        stopIndexReady
          .then(() => provider.loadRoutesList())
          .then(() => provider.loadRouteStopIndex())
          .catch(() => {}); // background enhancement — a failure here shouldn't surface as an error
      }
    });

    searchInput.addEventListener('input', () => {
      clearTimeout(searchDebounce);
      const q = searchInput.value;
      if (!q.trim() || !pickerCompany) {
        searchResults.classList.add('hidden');
        searchResults.innerHTML = '';
        return;
      }
      searchDebounce = setTimeout(async () => {
        const provider = Providers[pickerCompany.id];
        const [stopResults, routeResults] = await Promise.all([
          provider.searchStops(q),
          provider.searchRoutes ? provider.searchRoutes(q) : Promise.resolve([]),
        ]);
        renderSearchResults(stopResults, routeResults);
      }, 200);
    });

    function renderSearchResults(stopResults, routeResults) {
      if (!stopResults.length && !routeResults.length) {
        searchResults.innerHTML = '<div class="px-4 py-3 text-sm text-muted-foreground">搵唔到相關車站或路線</div>';
        searchResults.classList.remove('hidden');
        return;
      }
      let html = '';
      if (routeResults.length) {
        html += '<div class="px-4 py-1.5 text-xs font-semibold text-muted-foreground bg-muted/60">🚌 路線</div>';
        html += routeResults.map(r => `
          <button type="button" class="w-full px-4 py-2.5 text-left text-sm hover:bg-muted transition-colors flex items-center gap-2"
            data-kind="route" data-provider="${r.providerId}" data-route="${escapeHtml(r.route)}" data-bound="${r.bound}" data-servicetype="${escapeHtml(r.serviceType)}" data-dest="${escapeHtml(r.destTc)}">
            <span class="shrink-0 rounded bg-primary text-primary-foreground text-xs font-bold px-2 py-1">${escapeHtml(r.route)}</span>
            <span class="truncate text-muted-foreground">開往 ${escapeHtml(r.destTc)}</span>
          </button>
        `).join('');
      }
      if (stopResults.length) {
        html += '<div class="px-4 py-1.5 text-xs font-semibold text-muted-foreground bg-muted/60">🚏 車站</div>';
        html += stopResults.map(r => `
          <button type="button" class="w-full px-4 py-2.5 text-left text-sm hover:bg-muted transition-colors" data-kind="stop" data-provider="${r.providerId}" data-stop="${r.stopId}" data-name="${escapeHtml(r.nameTc)}">
            <div class="flex items-center justify-between gap-2">
              <span>${escapeHtml(r.nameTc)}</span>
              <span class="text-xs text-muted-foreground shrink-0">${escapeHtml(r.nameEn)}</span>
            </div>
            ${r.routesPreview && r.routesPreview.length ? `<div class="mt-0.5 text-xs text-muted-foreground truncate">路線：${escapeHtml(r.routesPreview.slice(0, 12).join('、'))}${r.routesPreview.length > 12 ? ' ...' : ''}</div>` : ''}
          </button>
        `).join('');
      }
      searchResults.innerHTML = html;
      searchResults.classList.remove('hidden');
      searchResults.querySelectorAll('button[data-kind="stop"]').forEach(btn => {
        btn.addEventListener('click', () => {
          selectStopForRouteChoice(btn.dataset.provider, btn.dataset.stop, btn.dataset.name);
        });
      });
      searchResults.querySelectorAll('button[data-kind="route"]').forEach(btn => {
        btn.addEventListener('click', () => {
          selectRouteForStopChoice(btn.dataset.provider, btn.dataset.route, btn.dataset.bound, btn.dataset.servicetype, btn.dataset.dest);
        });
      });
    }

    async function selectRouteForStopChoice(providerId, route, bound, serviceType, destTc) {
      hideAllPickerSteps();
      document.getElementById('picker-step-route-stops').classList.remove('hidden');
      document.getElementById('route-stops-title').textContent = `路線 ${route}　開往 ${destTc}`;
      const list = document.getElementById('route-stops-list');
      list.innerHTML = '<div class="px-4 py-3 text-sm text-muted-foreground">載入車站中...</div>';
      try {
        const stops = await Providers[providerId].getStopsForRoute(route, bound, serviceType);
        if (!stops.length) {
          list.innerHTML = '<div class="px-4 py-3 text-sm text-muted-foreground">搵唔到呢條路線嘅車站</div>';
          return;
        }
        list.innerHTML = stops.map(s => `
          <button type="button" class="w-full px-4 py-2.5 text-left text-sm hover:bg-muted transition-colors flex items-center gap-3" data-provider="${s.providerId}" data-stop="${s.stopId}" data-name="${escapeHtml(s.nameTc)}">
            <span class="shrink-0 text-xs text-muted-foreground w-6 text-right">${escapeHtml(s.seq)}</span>
            <span class="flex-1 truncate">${escapeHtml(s.nameTc)}</span>
          </button>
        `).join('');
        list.querySelectorAll('button').forEach(btn => {
          btn.addEventListener('click', () => {
            selectStopForRouteChoice(btn.dataset.provider, btn.dataset.stop, btn.dataset.name);
          });
        });
      } catch (err) {
        list.innerHTML = '<div class="px-4 py-3 text-sm text-red-500">載入失敗，請返回重試</div>';
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ---------- My stops (persisted client-side, no login/backend needed) ----------
    const STORAGE_KEY = 'bus_my_stops';
    function getMyStops() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
    }
    function saveMyStops(stops) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(stops));
    }
    function addStop(providerId, stopId, name, routes) {
      const stops = getMyStops();
      if (stops.some(s => s.providerId === providerId && s.stopId === stopId)) return;
      stops.push({ providerId, stopId, name, routes: routes || null });
      saveMyStops(stops);
      renderMyStops();
    }
    function removeStop(providerId, stopId) {
      saveMyStops(getMyStops().filter(s => !(s.providerId === providerId && s.stopId === stopId)));
      renderMyStops();
    }

    function renderMyStops() {
      const stops = getMyStops();
      const container = document.getElementById('my-stops');
      const emptyState = document.getElementById('empty-state');
      if (!stops.length) {
        container.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }
      emptyState.classList.add('hidden');
      container.innerHTML = stops.map(s => `
        <div class="rounded-2xl border border-border card-surface bg-card p-5" data-card-provider="${s.providerId}" data-card-stop="${s.stopId}">
          <div class="mb-3 flex items-center justify-between">
            <div>
              <h3 class="font-bold text-lg">${escapeHtml(s.name)}</h3>
              <span class="text-xs text-muted-foreground">${Providers[s.providerId]?.label || s.providerId}</span>
            </div>
            <button onclick="removeStop('${s.providerId}','${s.stopId}')" class="text-xs text-muted-foreground hover:text-red-500 transition-colors px-2 py-1">移除 ✕</button>
          </div>
          <div class="eta-list space-y-2 text-sm">
            <div class="text-muted-foreground">載入中...</div>
          </div>
        </div>
      `).join('');
      stops.forEach(s => refreshStopEta(s));
    }

    async function refreshStopEta(stop) {
      const card = document.querySelector(`[data-card-provider="${stop.providerId}"][data-card-stop="${stop.stopId}"]`);
      if (!card) return;
      const listEl = card.querySelector('.eta-list');
      try {
        const etas = await Providers[stop.providerId].fetchEta(stop.stopId);
        if (!etas.length) {
          listEl.innerHTML = '<div class="text-muted-foreground">暫無班次資料</div>';
          return;
        }
        // stop.routes (if set) restricts display to the routes the user ticked when adding this tile
        let groups = groupEtasByRoute(etas);
        if (stop.routes && stop.routes.length) {
          groups = groups.filter(g => stop.routes.includes(g.key));
        }
        if (!groups.length) {
          listEl.innerHTML = '<div class="text-muted-foreground">已揀嘅路線暫無班次資料</div>';
          return;
        }
        listEl.innerHTML = groups.map(g => {
          const mins = g.etas.slice(0, 3).map(e => {
            const diffMs = new Date(e.etaTime).getTime() - Date.now();
            const diffMin = Math.round(diffMs / 60000);
            if (diffMin <= 0) return '<span class="eta-pill inline-block rounded-full bg-accent text-white px-2.5 py-0.5 font-semibold">即將到達</span>';
            return `<span class="eta-pill inline-block rounded-full muted-surface bg-muted px-2.5 py-0.5 font-medium">${diffMin} 分鐘</span>`;
          }).join(' ');
          return `
            <div class="flex items-center justify-between gap-3 py-1">
              <div class="flex items-center gap-2 min-w-0">
                <span class="shrink-0 rounded bg-primary text-primary-foreground text-xs font-bold px-2 py-1">${escapeHtml(g.route)}</span>
                <span class="truncate text-muted-foreground">往 ${escapeHtml(g.dest)}</span>
              </div>
              <div class="flex items-center gap-1.5 shrink-0">${mins}</div>
            </div>
          `;
        }).join('');
      } catch (err) {
        listEl.innerHTML = '<div class="text-red-500">載入失敗，稍後重試</div>';
      }
    }

    function refreshAllStops() {
      const dot = document.getElementById('refresh-dot');
      dot.style.background = '';
      getMyStops().forEach(s => refreshStopEta(s));
    }

    // ---------- Init ----------
    renderMyStops();
    setInterval(refreshAllStops, 30000);

    // close search results on outside click
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#search-input') && !e.target.closest('#search-results')) {
        searchResults.classList.add('hidden');
      }
    });
  </script>

</body>
</html>
